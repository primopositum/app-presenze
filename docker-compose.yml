services:
  # ===========================================
  # BACKEND - Django REST API
  # ===========================================
  backend:
    build:
      context: ./AppPresenze
      dockerfile: Dockerfile
    volumes:
      # Dati persistenti per scontrini e PDF
      - ./data/scontrini:/mnt/scontrini
      - ./data/pdf:/mnt/pdf
      - static_files:/app/staticfiles
    ports:
      - "7999:7999"
    env_file:
      - ./AppPresenze/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - app-network

  # ===========================================
  # FRONTEND - SvelteKit UI
  # ===========================================
  ui:
    build:
      context: ./UIpresenze
      dockerfile: Dockerfile
    volumes:
      - static_files:/usr/share/nginx/static
    ports:
      - "3623:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network
  # ===========================================
  # SCHEDULER - cronjobs
  # ===========================================
  scheduler:
    build:
      context: ./AppPresenze
      dockerfile: Dockerfile
    env_file:
      - ./AppPresenze/.env
    environment:
      TZ: Europe/Rome
    command: ["/bin/sh", "/app/scripts/run_scheduler.sh"]
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
volumes:
  static_files:
